<div class="counter">
    <h1 class="count">{{count}}</h1>
    <button (click)="handleCounter('minus')" class="btn">-</button>
    <button (click)="handleCounter('reset')" class="btn">Reset</button>
    <button (click)="handleCounter('plus')" class="btn">+</button>
</div>
